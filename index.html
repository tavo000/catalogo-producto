<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo de productos</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
padding:0;
}

h1{
padding:20px;
margin:0;
background:#1f2937;
color:white;
}

/* CONTENEDOR CATEGORIAS */

#categorias{
padding:15px;
display:flex;
flex-wrap:wrap;
}

/* BOTONES CATEGORIA */

#categorias button{
margin:5px;
padding:10px 18px;
border-radius:8px;
border:none;
background:#374151;
color:white;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

#categorias button:hover{
background:#2563eb;
}

#categorias button.active{
background:#22c55e;
}

/* SELECTOR MOBILE */

#categoriaSelect{
display:none;
width:90%;
margin:15px;
padding:12px;
font-size:16px;
border-radius:8px;
}

/* GRID PRODUCTOS */

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:25px;
padding:25px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
text-align:center;
box-shadow:0 8px 18px rgba(0,0,0,0.08);
transition:0.25s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 12px 25px rgba(0,0,0,0.15);
}

.card img{
width:100%;
height:160px;
object-fit:contain;
}

.price{
color:#16a34a;
font-weight:bold;
font-size:18px;
}

/* RESPONSIVE */

@media (max-width:768px){

#categorias{
display:none;
}

#categoriaSelect{
display:block;
}

.grid{
grid-template-columns:repeat(2,1fr);
gap:12px;
padding:12px;
}

.card img{
height:140px;
}

}

/* BOTON AGREGAR */

.buy-btn{
display:inline-block;
margin-top:10px;
padding:10px 14px;
background:#25D366;
color:white;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

.buy-btn:hover{
background:#1ebe5d;
}

/* BUSCADOR */

.search-container{
padding:20px;
display:flex;
justify-content:center;
gap:10px;
}

#search{
width:60%;
max-width:500px;
padding:12px 15px;
border-radius:8px;
border:1px solid #ddd;
font-size:16px;
outline:none;
}

#search:focus{
border:1px solid #2563eb;
box-shadow:0 0 4px rgba(37,99,235,0.3);
}

#sort{
padding:12px;
border-radius:8px;
border:1px solid #ddd;
}

/* WHATSAPP */

.whatsapp-float{
position:fixed;
bottom:20px;
right:20px;
width:60px;
height:60px;
background:#25D366;
color:white;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
text-decoration:none;
box-shadow:0 8px 20px rgba(0,0,0,0.25);
z-index:999;
}

.whatsapp-float:hover{
background:#1ebe5d;
}

/* CARRITO */

.cart-float{
position:fixed;
bottom:100px;
right:20px;
background:#2563eb;
color:white;
padding:15px 18px;
border-radius:50px;
font-weight:bold;
cursor:pointer;
box-shadow:0 8px 20px rgba(0,0,0,0.25);
}

.cart-float span{
background:white;
color:black;
padding:3px 7px;
border-radius:10px;
margin-left:5px;
}

</style>

</head>

<body>

<h1>Catálogo de productos</h1>

<div class="search-container">

<input
type="text"
id="search"
placeholder="🔎 Buscar productos..."
onkeyup="searchProduct()"
/>

<select id="sort" onchange="sortProducts()">

<option value="">Ordenar por</option>
<option value="higher">Precio más alto</option>
<option value="lower">Precio más bajo</option>
<option value="az">A-Z</option>
<option value="za">Z-A</option>

</select>

</div>

<select id="categoriaSelect"></select>

<div id="categorias"></div>

<div id="productos" class="grid"></div>

<script>

let categorias = {}
let cart = []

fetch("./productos.json")
.then(r=>r.json())
.then(data=>{

data.forEach(p=>{

let cat = p.category || "Otros"

if(!categorias[cat]) categorias[cat] = []

categorias[cat].push(p)

})

mostrarCategoria(Object.keys(categorias)[0])

})

function mostrarCategoria(cat){

const contenedor = document.getElementById("productos")

contenedor.innerHTML=""

categorias[cat].forEach(p=>{

contenedor.innerHTML+=`
<div class="card">

<img src="${p.image}" loading="lazy">

<h4>${p.name}</h4>

<p class="price">${p.price}</p>

<button class="buy-btn" onclick="addCart('${p.name}','${p.price}')">
Agregar al carrito
</button>

</div>
`

})

}

function searchProduct(){

const texto = document.getElementById("search").value.toLowerCase()

const contenedor = document.getElementById("productos")

contenedor.innerHTML=""

Object.values(categorias).flat().forEach(p=>{

if(p.name.toLowerCase().includes(texto)){

contenedor.innerHTML+=`
<div class="card">

<img src="${p.image}">

<h4>${p.name}</h4>

<p class="price">${p.price}</p>

<button class="buy-btn" onclick="addCart('${p.name}','${p.price}')">
Agregar al carrito
</button>

</div>
`

}

})

}

function addCart(nombre,precio){

const producto = cart.find(p=>p.name===nombre)

if(producto){

producto.cantidad++

}else{

cart.push({
name:nombre,
price:precio,
cantidad:1
})

}

document.getElementById("contadorCarrito").innerText = cart.length

}

</script>

<a
href="https://wa.me/5493401415127?text=Hola%20quiero%20comprar"
class="whatsapp-float"
target="_blank"
>
💬
</a>

<a class="cart-float">
🛒 <span id="contadorCarrito">0</span>
</a>

</body>

</html>
