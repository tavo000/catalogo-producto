<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Catálogo de productos</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:#f4f6f9;
margin:0;
padding:0;
}

h1{
background:#1f2937;
color:white;
padding:20px;
margin:0;
}

/* CONTENEDOR */

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

/* BUSCADOR */

.search-container{
display:flex;
gap:10px;
margin-bottom:20px;
}

#search{
flex:1;
padding:12px;
border-radius:8px;
border:1px solid #ddd;
font-size:16px;
}

#sort{
padding:12px;
border-radius:8px;
border:1px solid #ddd;
font-size:15px;
background:white;
cursor:pointer;
}

/* CATEGORIAS */

.categorias{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:25px;
}

.categorias button{
background:#e5e7eb;
border:none;
padding:8px 14px;
border-radius:20px;
cursor:pointer;
font-size:14px;
transition:0.2s;
}

.categorias button:hover{
background:#2563eb;
color:white;
}

/* GRID PRODUCTOS */

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
}

/* TARJETA PRODUCTO */

.card{
background:white;
border-radius:12px;
padding:15px;
text-align:center;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
transition:0.25s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:160px;
object-fit:contain;
}

.price{
color:#16a34a;
font-weight:bold;
font-size:18px;
margin:10px 0;
}

.buy-btn{
background:#22c55e;
border:none;
color:white;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.buy-btn:hover{
background:#16a34a;
}

/* CARRITO */

.cart-float{
position:fixed;
right:20px;
bottom:90px;
background:#2563eb;
color:white;
padding:14px 18px;
border-radius:40px;
font-weight:bold;
cursor:pointer;
box-shadow:0 8px 20px rgba(0,0,0,0.25);
}

.cart-float span{
background:white;
color:black;
padding:3px 8px;
border-radius:10px;
margin-left:5px;
}

/* WHATSAPP */

.whatsapp{
position:fixed;
right:20px;
bottom:20px;
background:#25D366;
color:white;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
text-decoration:none;
box-shadow:0 8px 20px rgba(0,0,0,0.25);
}

.whatsapp:hover{
background:#1ebe5d;
}

</style>
  
</head>

<body>

<header>

Catálogo de productos

</header>

<div class="container">

<div class="search-bar">

<input type="text" placeholder="🔎 Buscar productos..." id="search">

<select id="sort">

<option value="">Ordenar por</option>
<option value="mayor">Precio más alto</option>
<option value="menor">Precio más bajo</option>
<option value="az">A-Z</option>
<option value="za">Z-A</option>

</select>

</div>

<div class="categorias">

<h3>Categorías</h3>

<div class="categoria-lista" id="categoriaLista"></div>

</div>

<div class="grid" id="productos"></div>

</div>

<div class="cart">

🛒 <span id="cartCount">0</span>

</div>

<script>

/* AQUI VA TODO TU CODIGO JAVASCRIPT */

let productos=[]
let carrito=[]

fetch("productos.json")
.then(r=>r.json())
.then(data=>{
productos=data
mostrarProductos(productos)
})

function mostrarProductos(lista){

let cont=document.getElementById("productos")

cont.innerHTML=""

lista.forEach(p=>{

cont.innerHTML+=`

<div class="card">

<img src="${p.image}">

<h4>${p.name}</h4>

<div class="price">${p.price}</div>

<button class="buy-btn"
onclick="agregarCarrito('${p.name}','${p.price}')">

Agregar al carrito

</button>

</div>

`

})

}

function agregarCarrito(nombre,precio){

let prod=carrito.find(p=>p.name===nombre)

if(prod){

prod.cantidad++

}else{

carrito.push({
name:nombre,
price:precio,
cantidad:1
})

}

actualizarCarrito()

}

function actualizarCarrito(){

let total=0
let cantidad=0

carrito.forEach(p=>{

let precio=parseFloat(
p.price.replace("$","").replace(/\./g,"").replace(",",".")
)

total+=precio*p.cantidad
cantidad+=p.cantidad

})

document.getElementById("contador").innerText=cantidad

window.totalCompra=total

}

function enviarWhatsApp(){

if(carrito.length===0){

alert("El carrito está vacío")

return
}

let mensaje="Hola, quiero comprar:%0A%0A"

carrito.forEach(p=>{

mensaje+=`${p.cantidad} x ${p.name} - ${p.price}%0A`

})

mensaje+=`%0ATotal: $${window.totalCompra.toLocaleString()}`

window.open(
`https://wa.me/5493401415127?text=${mensaje}`
)

}

</script>  

<div class="cart-float" onclick="enviarWhatsApp()">
🛒 <span id="contador">0</span>
</div>

<a
href="https://wa.me/5493401415127"
class="whatsapp"
target="_blank">

💬

</a>

</body>

</html>
