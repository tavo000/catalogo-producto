<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo de Productos</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:#f4f6f9;
margin:0;
}

/* HEADER */

header{
background:linear-gradient(135deg,#1f2937,#111827);
color:white;
padding:22px;
text-align:center;
font-size:30px;
font-weight:bold;
margin-top:45px;
}

/* CONTAINER */

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

/* BUSCADOR */

.search-bar{
display:flex;
gap:12px;
justify-content:center;
margin-bottom:25px;
flex-wrap:wrap;
}

#search{
width:60%;
padding:14px;
border-radius:10px;
border:1px solid #ccc;
}

#sort{
padding:14px;
border-radius:10px;
border:1px solid #ccc;
}

/* CATEGORIAS */

.categorias{
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
margin-bottom:25px;
}

.categorias button{
background:#e5e7eb;
border:none;
padding:8px 18px;
border-radius:25px;
cursor:pointer;
font-weight:bold;
}

.categorias button.active{
background:#2563eb;
color:white;
}

/* GRID PRODUCTOS */

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
gap:20px;
}

/* TARJETA */

.card{
background:white;
border-radius:12px;
padding:18px;
text-align:center;
box-shadow:0 6px 15px rgba(0,0,0,0.08);
}

.card img{
width:100%;
height:220px;
object-fit:contain;
margin-bottom:10px;
}

.card h4{
font-size:15px;
margin:10px 0;
min-height:40px;
}

/* PRECIO */

.price{
color:#16a34a;
font-weight:bold;
font-size:18px;
margin:10px 0;
}

/* BOTONES */

.buy-btn{
background:#22c55e;
color:white;
border:none;
padding:10px;
border-radius:6px;
cursor:pointer;
width:100%;
}

.buy-now{
background:#2563eb;
color:white;
border:none;
padding:10px;
border-radius:6px;
cursor:pointer;
margin-top:6px;
width:100%;
}

/* CARRITO */

.cart-button{
position:fixed;
right:20px;
bottom:90px;
background:#2563eb;
color:white;
padding:15px 18px;
border-radius:40px;
cursor:pointer;
}

.cart-button span{
background:white;
color:black;
padding:3px 8px;
border-radius:10px;
margin-left:6px;
}

#cartPanel{
position:fixed;
top:0;
right:-400px;
width:350px;
height:100%;
background:white;
box-shadow:-5px 0 20px rgba(0,0,0,0.2);
padding:20px;
transition:0.3s;
overflow:auto;
}

#cartPanel.open{
right:0;
}

/* WHATSAPP */

.whatsapp{
position:fixed;
right:20px;
bottom:20px;
background:#25D366;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
}

.btn-whatsapp{
background:#25D366;
color:white;
border:none;
padding:12px;
border-radius:8px;
width:100%;
margin-top:15px;
font-weight:bold;
cursor:pointer;
}

.btn-clear{
background:#ef4444;
color:white;
border:none;
padding:12px;
border-radius:8px;
width:100%;
margin-top:10px;
cursor:pointer;
}

.btn-close{
background:#e5e7eb;
border:none;
padding:8px 14px;
border-radius:20px;
font-size:14px;
cursor:pointer;
}

.categoria-lista button:hover{
background:#d1d5db;
}

</style>
</head>

<body>

<header>

Catálogo de productos

</header>

<div class="container">

<div class="search-bar">
<input id="search" placeholder="Buscar productos...">

<select id="sort">
<option value="">Ordenar por</option>
<option value="az">A-Z</option>
<option value="za">Z-A</option>
<option value="menor">Precio menor</option>
<option value="mayor">Precio mayor</option>
</select>
</div>

<div id="categorias" class="categorias"></div>
<div id="productos" class="grid"></div>

</div>

<div class="cart-button" onclick="toggleCart()">
🛒 <span id="contador">0</span>
</div>

<div id="cartPanel">

<h2>Tu carrito</h2>

<div id="cartItems"></div>

<div id="cartTotal" class="cart-total"></div>

<button class="btn-whatsapp" onclick="enviarWhatsApp()">
Enviar pedido por WhatsApp
</button>

<button class="btn-clear" onclick="limpiarCarrito()">
Limpiar carrito
</button>

<button class="btn-close" onclick="toggleCart()">
Cerrar carrito
</button>

</div>

<a href="https://wa.me/5493401415127" class="whatsapp" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" width="30">
</a>

<script>

let productos=[]
let categorias={}
let carrito=JSON.parse(localStorage.getItem("carrito"))||[]

fetch("productos.json")
.then(r=>r.json())
.then(data=>{

productos=data

data.forEach(p=>{

let cat=(p.category||"Otros").split(">")[0].trim()

if(!categorias[cat]) categorias[cat]=[]

categorias[cat].push(p)

})

crearCategorias()

let categoriaGuardada = localStorage.getItem("categoriaActiva")

if(categoriaGuardada && categorias[categoriaGuardada]){

mostrarProductos(categorias[categoriaGuardada])

setTimeout(()=>{
document.querySelectorAll(".categorias button").forEach(btn=>{
if(btn.innerText===categoriaGuardada){
btn.classList.add("active")
}
})
},50)

}else{

mostrarProductos(productos)

}

actualizarCarrito()

})

function crearCategorias(){

let cont=document.getElementById("categorias")

Object.keys(categorias).forEach(cat=>{

let btn=document.createElement("button")
btn.textContent=cat

btn.onclick=()=>{

document.querySelectorAll(".categorias button")
.forEach(b=>b.classList.remove("active"))

btn.classList.add("active")

localStorage.setItem("categoriaActiva",cat)

mostrarProductos(categorias[cat])

}

cont.appendChild(btn)

})

}

function mostrarProductos(lista){
productosVisibles = lista
let cont=document.getElementById("productos")

let html=""

lista.forEach(p=>{

html+=`

<div class="card">
<a href="producto.html?nombre=${encodeURIComponent(p.name)}&categoria=${encodeURIComponent(p.category)}">

<img src="${p.image}">
</a>

<h4>${p.name}</h4>

<div class="price">${p.price}</div>

<button class="buy-btn"
onclick="agregarCarrito('${p.name}','${p.price}')">
Agregar al carrito
</button>

<button class="buy-now"
onclick="comprarAhora('${p.name}','${p.price}')">
Comprar ahora
</button>

</div>

`

})

cont.innerHTML=html

}

}

document.getElementById("cartCount").innerText=carrito.length

</script>

<button id="btnTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

</body>
</html>
