<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Catálogo de Productos</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:#f4f6f9;
margin:0;
}

header{
background:linear-gradient(135deg,#1f2937,#111827);
color:white;
padding:22px;
text-align:center;
font-size:30px;
font-weight:bold;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

/* BUSCADOR */

.search-bar{
display:flex;
gap:12px;
justify-content:center;
margin-bottom:25px;
flex-wrap:wrap;
}

#search{
width:70%;
padding:14px;
border-radius:8px;
border:1px solid #ddd;
font-size:16px;
}

#sort{
padding:14px;
border-radius:8px;
border:1px solid #ddd;
}

/* CATEGORIAS */

.categorias{
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
margin-bottom:25px;
}

.categorias button{
background:#e5e7eb;
border:none;
padding:8px 18px;
border-radius:25px;
cursor:pointer;
font-weight:bold;
}

.categorias button.active{
background:#22c55e;
color:white;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
}

/* CARD */

.card{
background:white;
border-radius:12px;
padding:15px;
text-align:center;
box-shadow:0 6px 15px rgba(0,0,0,0.08);
}

.card img{
width:100%;
height:160px;
object-fit:contain;
}

.price{
color:#16a34a;
font-weight:bold;
font-size:18px;
margin:10px 0;
}

.buy-btn{
background:#22c55e;
color:white;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

/* CARRITO */

.cart-button{
position:fixed;
right:20px;
bottom:90px;
background:#2563eb;
color:white;
padding:15px 18px;
border-radius:40px;
cursor:pointer;
font-weight:bold;
}

.cart-button span{
background:white;
color:black;
padding:3px 8px;
border-radius:10px;
margin-left:6px;
}

#cartPanel{
position:fixed;
top:0;
right:-400px;
width:350px;
height:100%;
background:white;
box-shadow:-5px 0 20px rgba(0,0,0,0.2);
padding:20px;
transition:0.3s;
overflow:auto;
}

#cartPanel.open{
right:0;
}

.cart-item{
border-bottom:1px solid #eee;
padding:10px 0;
}

.cart-total{
font-size:20px;
font-weight:bold;
margin-top:15px;
}

.btn-whatsapp{
background:#25D366;
color:white;
border:none;
padding:12px;
border-radius:6px;
font-weight:bold;
width:100%;
margin-top:15px;
cursor:pointer;
}

.btn-close{
background:#eee;
border:none;
padding:10px;
border-radius:6px;
width:100%;
margin-top:10px;
cursor:pointer;
}

/* WHATSAPP */

.whatsapp{
position:fixed;
right:20px;
bottom:20px;
background:#25D366;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 8px 20px rgba(0,0,0,0.25);
}

</style>

</head>

<body>

<header>
Catálogo de Productos
</header>

<div class="container">

<div class="search-bar">

<input id="search" placeholder="Buscar productos...">

<select id="sort">

<option value="">Ordenar por</option>
<option value="mayor">Precio más alto</option>
<option value="menor">Precio más bajo</option>
<option value="az">A-Z</option>
<option value="za">Z-A</option>

</select>

</div>

<div id="categorias" class="categorias"></div>

<div id="productos" class="grid"></div>

</div>

<div class="cart-button" onclick="toggleCart()">
🛒 <span id="contador">0</span>
</div>

<div id="cartPanel">

<h2>Tu carrito</h2>

<div id="cartItems"></div>

<div id="cartTotal" class="cart-total"></div>

<button class="btn-whatsapp" onclick="enviarWhatsApp()">
Enviar pedido por WhatsApp
</button>

<button onclick="limpiarCarrito()" class="btn-close">
Limpiar carrito
</button>  

<button class="btn-close" onclick="toggleCart()">
Cerrar carrito
</button>

</div>

<a 
href="https://wa.me/5493401415127"
class="whatsapp"
target="_blank">

<img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" width="30">

</a>

<script>

let productos=[]
let categorias={}
let carrito=[]

fetch("productos.json")
.then(r=>r.json())
.then(data=>{

productos=data

data.forEach(p=>{

let raw=p.category || "Otros"

let cat=raw.split(">")[0].trim()

if(!categorias[cat]) categorias[cat]=[]

categorias[cat].push(p)

})

crearCategorias()

mostrarProductos(productos)

})

function mostrarProductos(lista){

let cont=document.getElementById("productos")

cont.innerHTML=""

lista.forEach(p=>{

cont.innerHTML+=`

<div class="card">

<a href="producto.html?nombre=${encodeURIComponent(p.name)}">

<img loading="lazy" src="${p.image}">

</a>

<h4>${p.name}</h4>

<div class="price">${p.price}</div>

<button class="buy-btn"
onclick="agregarCarrito('${p.name}','${p.price}')">

Agregar al carrito

</button>

</div>

`

})

}

function crearCategorias(){

let cont=document.getElementById("categorias")

Object.keys(categorias).forEach(cat=>{

let btn=document.createElement("button")

btn.textContent=cat

btn.onclick=()=>{

document.querySelectorAll(".categorias button")
.forEach(b=>b.classList.remove("active"))

btn.classList.add("active")

mostrarProductos(categorias[cat])

}

cont.appendChild(btn)

})

}

function agregarCarrito(nombre,precio){

let prod=carrito.find(p=>p.name===nombre)

if(prod){

prod.cantidad++

}else{

carrito.push({
name:nombre,
price:precio,
cantidad:1
})

}

actualizarCarrito()

}

function sumarCantidad(index){

carrito[index].cantidad++

actualizarCarrito()

}

function restarCantidad(index){

carrito[index].cantidad--

if(carrito[index].cantidad<=0){

carrito.splice(index,1)

}

actualizarCarrito()

}

function eliminarProducto(index){

carrito.splice(index,1)

actualizarCarrito()

}

function limpiarCarrito(){

carrito=[]

actualizarCarrito()

}
  

function actualizarCarrito(){

let total=0
let cantidad=0

let cont=document.getElementById("cartItems")
cont.innerHTML=""

carrito.forEach((p,index)=>{

let precio=parseFloat(
p.price.replace("$","").replace(/\./g,"").replace(",",".")
)

let subtotal=precio*p.cantidad

total+=subtotal
cantidad+=p.cantidad

cont.innerHTML+=`

<div class="cart-item">

<b>${p.name}</b><br>

<div style="margin:6px 0; display:flex; gap:8px; align-items:center;">

<button onclick="restarCantidad(${index})">➖</button>

<span>${p.cantidad}</span>

<button onclick="sumarCantidad(${index})">➕</button>

<button onclick="eliminarProducto(${index})" style="margin-left:auto;">
🗑
</button>

</div>

Subtotal: $${subtotal.toLocaleString()}

</div>

`

})

document.getElementById("contador").innerText=cantidad

document.getElementById("cartTotal").innerHTML=
"Total: $" + total.toLocaleString()

window.totalCompra=total

}

function toggleCart(){

document.getElementById("cartPanel")
.classList.toggle("open")

}

function enviarWhatsApp(){

if(carrito.length===0){

alert("El carrito está vacío")
return

}

let mensaje="Hola, quiero comprar:%0A%0A"

carrito.forEach(p=>{

mensaje+=`${p.cantidad} x ${p.name} - ${p.price}%0A`

})

mensaje+=`%0ATotal: $${window.totalCompra.toLocaleString()}`

window.open(
`https://wa.me/5493401415127?text=${mensaje}`
)

}

/* BUSCADOR */

document.getElementById("search")
.addEventListener("input",function(){

let texto=this.value.toLowerCase()

let filtrados=productos.filter(p=>
p.name.toLowerCase().includes(texto)
)

mostrarProductos(filtrados)

})

/* ORDENAR */

document.getElementById("sort")
.addEventListener("change",function(){

let valor=this.value

let copia=[...productos]

if(valor==="az"){
copia.sort((a,b)=>a.name.localeCompare(b.name))
}

if(valor==="za"){
copia.sort((a,b)=>b.name.localeCompare(a.name))
}

mostrarProductos(copia)

})

</script>

</body>
</html>
