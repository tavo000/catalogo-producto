<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Catálogo de Productos</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:#f4f6f9;
margin:0;
}

header{
background:linear-gradient(135deg,#1f2937,#111827);
color:white;
padding:22px;
text-align:center;
font-size:30px;
font-weight:bold;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.search-bar{
display:flex;
gap:12px;
justify-content:center;
margin-bottom:25px;
flex-wrap:wrap;
}

#search{
width:60%;
padding:14px;
border-radius:10px;
border:1px solid #ccc;
}

#sort{
padding:14px;
border-radius:10px;
border:1px solid #ccc;
}

.categorias{
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
margin-bottom:25px;
}

.categorias button{
background:#e5e7eb;
border:none;
padding:8px 18px;
border-radius:25px;
cursor:pointer;
font-weight:bold;
}

.categorias button.active{
background:#22c55e;
color:white;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:12px;
padding:15px;
text-align:center;
box-shadow:0 6px 15px rgba(0,0,0,0.08);
}

.card img{
width:100%;
height:160px;
object-fit:contain;
}

.price{
color:#16a34a;
font-weight:bold;
font-size:18px;
margin:10px 0;
}

.buy-btn{
background:#22c55e;
color:white;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.cart-button{
position:fixed;
right:20px;
bottom:90px;
background:#2563eb;
color:white;
padding:15px 18px;
border-radius:40px;
cursor:pointer;
font-weight:bold;
}

.cart-button span{
background:white;
color:black;
padding:3px 8px;
border-radius:10px;
margin-left:6px;
}

#cartPanel{
position:fixed;
top:0;
right:-400px;
width:350px;
height:100%;
background:white;
box-shadow:-5px 0 20px rgba(0,0,0,0.2);
padding:20px;
transition:0.3s;
overflow:auto;
}

#cartPanel.open{
right:0;
}

.cart-item{
border-bottom:1px solid #eee;
padding:10px 0;
}

.cart-total{
font-size:20px;
font-weight:bold;
margin-top:15px;
}

.whatsapp{
position:fixed;
right:20px;
bottom:20px;
background:#25D366;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
}

</style>

</head>

<body>

<header>
Catálogo de Productos
</header>

<div class="container">

<div class="search-bar">

<input id="search" placeholder="Buscar productos...">

<select id="sort">

<option value="">Ordenar por</option>
<option value="mayor">Precio más alto</option>
<option value="menor">Precio más bajo</option>
<option value="az">A-Z</option>
<option value="za">Z-A</option>

</select>

</div>

<div id="categorias" class="categorias"></div>

<div id="productos" class="grid"></div>

</div>

<div class="cart-button" onclick="toggleCart()">
🛒 <span id="contador">0</span>
</div>

<div id="cartPanel">

<h2>Tu carrito</h2>

<div id="cartItems"></div>

<div id="cartTotal" class="cart-total"></div>

<button onclick="limpiarCarrito()">Limpiar carrito</button>

<button onclick="toggleCart()">Cerrar carrito</button>

</div>

<a href="https://wa.me/5493401415127" class="whatsapp" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" width="30">
</a>

<script>

let productos=[]
let categorias={}
let carrito=JSON.parse(localStorage.getItem("carrito"))||[]

fetch("productos.json")
.then(r=>r.json())
.then(data=>{

productos=data

data.forEach(p=>{

let cat=(p.category||"Otros").split(">")[0].trim()

if(!categorias[cat]) categorias[cat]=[]

categorias[cat].push(p)

})

crearCategorias()

let categoriaGuardada=localStorage.getItem("categoriaActual")

if(categoriaGuardada && categorias[categoriaGuardada]){

mostrarProductos(categorias[categoriaGuardada])

}else{

mostrarProductos(productos)

}

actualizarCarrito()

})

function crearCategorias(){

let cont=document.getElementById("categorias")

cont.innerHTML=""

Object.keys(categorias).forEach(cat=>{

let btn=document.createElement("button")

btn.textContent=cat

btn.onclick=()=>{

document.querySelectorAll(".categorias button")
.forEach(b=>b.classList.remove("active"))

btn.classList.add("active")

localStorage.setItem("categoriaActual",cat)

mostrarProductos(categorias[cat])

}

cont.appendChild(btn)

})

}

function mostrarProductos(lista){

let cont=document.getElementById("productos")

let html=""

lista.forEach(p=>{

html+=`
<div class="card">

<a href="producto.html?nombre=${encodeURIComponent(p.name)}">

<img src="${p.image}" loading="lazy">

</a>

<h4>${p.name}</h4>

<div class="price">${p.price}</div>

<button class="buy-btn"
onclick="agregarCarrito('${p.name}','${p.price}')">
Agregar al carrito
</button>

</div>
`

})

cont.innerHTML=html

}

function agregarCarrito(nombre,precio){

let prod=carrito.find(p=>p.name===nombre)

if(prod) prod.cantidad++
else carrito.push({name:nombre,price:precio,cantidad:1})

actualizarCarrito()

}

function limpiarCarrito(){

carrito=[]
actualizarCarrito()

}

function actualizarCarrito(){

let total=0
let cantidad=0

let cont=document.getElementById("cartItems")
cont.innerHTML=""

carrito.forEach(p=>{

cantidad+=p.cantidad

cont.innerHTML+=`<div class="cart-item">${p.name} x ${p.cantidad}</div>`

})

document.getElementById("contador").innerText=cantidad

localStorage.setItem("carrito",JSON.stringify(carrito))

}

function toggleCart(){

document.getElementById("cartPanel").classList.toggle("open")

}

document.getElementById("search").addEventListener("input",function(){

let texto=this.value.toLowerCase()

let lista=productos.filter(p=>p.name.toLowerCase().includes(texto))

mostrarProductos(lista)

})

document.getElementById("sort").addEventListener("change",function(){

let v=this.value

let lista=[...productos]

if(v==="az") lista.sort((a,b)=>a.name.localeCompare(b.name))
if(v==="za") lista.sort((a,b)=>b.name.localeCompare(a.name))

mostrarProductos(lista)

})

</script>

</body>
</html>
