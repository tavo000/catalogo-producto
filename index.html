<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Catálogo de productos</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
padding:0;
}

/* HEADER */

header{
background:#1f2937;
color:white;
padding:20px;
font-size:26px;
font-weight:bold;
}

/* CONTENEDOR PRINCIPAL */

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

/* BUSCADOR */

.search-bar{
display:flex;
gap:10px;
margin-bottom:20px;
}

.search-bar input{

flex:1;
padding:12px;
border-radius:8px;
border:1px solid #ddd;
font-size:16px;

}

.search-bar select{

padding:12px;
border-radius:8px;
border:1px solid #ddd;

}

/* CATEGORIAS */

.categorias{

margin-bottom:20px;

}

.categorias h3{

margin-bottom:10px;

}

.categoria-lista{

display:flex;
flex-wrap:wrap;
gap:10px;

}

.categoria-lista button{

padding:8px 14px;
border-radius:20px;
border:none;
background:#e5e7eb;
cursor:pointer;

}

.categoria-lista button:hover{

background:#d1d5db;

}

/* GRID PRODUCTOS */

.grid{

display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;

}

/* TARJETA */

.card{

background:white;
border-radius:10px;
padding:15px;
text-align:center;
box-shadow:0 6px 15px rgba(0,0,0,0.08);

}

.card img{

width:100%;
height:160px;
object-fit:contain;

}

.card h4{

font-size:16px;
margin:10px 0;

}

.price{

color:#16a34a;
font-weight:bold;
font-size:18px;

}

.buy{

margin-top:10px;
background:#22c55e;
border:none;
color:white;
padding:10px;
border-radius:6px;
cursor:pointer;

}

.buy:hover{

background:#16a34a;

}

/* CARRITO */

.cart{

position:fixed;
right:20px;
bottom:80px;
background:#2563eb;
color:white;
padding:14px 18px;
border-radius:40px;
cursor:pointer;

}

.cart span{

background:white;
color:black;
padding:3px 8px;
border-radius:10px;
margin-left:5px;

}

</style>

</head>

<body>

<header>

Catálogo de productos

</header>

<div class="container">

<div class="search-bar">

<input type="text" placeholder="🔎 Buscar productos..." id="search">

<select id="sort">

<option value="">Ordenar por</option>
<option value="mayor">Precio más alto</option>
<option value="menor">Precio más bajo</option>
<option value="az">A-Z</option>
<option value="za">Z-A</option>

</select>

</div>

<div class="categorias">

<h3>Categorías</h3>

<div class="categoria-lista" id="categoriaLista"></div>

</div>

<div class="grid" id="productos"></div>

</div>

<div class="cart">

🛒 <span id="cartCount">0</span>

</div>

<script>

let productos=[]
let carrito=[]
let categorias={}

fetch("productos.json")

.then(r=>r.json())

.then(data=>{

productos=data

data.forEach(p=>{

let cat=p.category || "Otros"

if(!categorias[cat]) categorias[cat]=[]

categorias[cat].push(p)

})

crearCategorias()

mostrarProductos(data)

})

function crearCategorias(){

let cont=document.getElementById("categoriaLista")

Object.keys(categorias).forEach(cat=>{

let btn=document.createElement("button")

btn.innerText=cat

btn.onclick=()=>mostrarProductos(categorias[cat])

cont.appendChild(btn)

})

}

function mostrarProductos(lista){

let cont=document.getElementById("productos")

cont.innerHTML=""

lista.forEach(p=>{

cont.innerHTML+=`

<div class="card">

<img src="${p.image}">

<h4>${p.name}</h4>

<div class="price">${p.price}</div>

<button class="buy" onclick="addCart('${p.name}')">

Agregar al carrito

</button>

</div>

`

})

}

function addCart(nombre){

let item=carrito.find(p=>p.name===nombre)

if(item){

item.qty++

}else{

carrito.push({name:nombre,qty:1})

}

document.getElementById("cartCount").innerText=carrito.length

}

</script>

</body>

</html>
