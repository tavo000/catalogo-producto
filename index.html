<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Catálogo de Productos</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:#f4f6f9;
margin:0;
}

header{
background:linear-gradient(135deg,#1f2937,#111827);
color:white;
padding:22px;
text-align:center;
font-size:30px;
font-weight:bold;
margin-top:45px;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.search-bar{
display:flex;
gap:12px;
justify-content:center;
margin-bottom:25px;
flex-wrap:wrap;
}

#search{
width:60%;
padding:14px;
border-radius:10px;
border:1px solid #ccc;
}

#sort{
padding:14px;
border-radius:10px;
border:1px solid #ccc;
}

.categorias{
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
margin-bottom:25px;
}

.categorias button{
background:#e5e7eb;
border:none;
padding:8px 18px;
border-radius:25px;
cursor:pointer;
font-weight:bold;
}

.categorias button.active{
background:#2563eb;
color:white;
box-shadow:0 4px 10px rgba(37,99,235,0.4);
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:12px;
padding:15px;
text-align:center;
box-shadow:0 6px 15px rgba(0,0,0,0.08);
}

.card img{
width:100%;
height:200px;
object-fit:contain;
margin-bottom:10px;
}

.price{
color:#16a34a;
font-weight:bold;
font-size:18px;
margin:10px 0;
}

.buy-btn{
background:#22c55e;
color:white;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.cart-button{
position:fixed;
right:20px;
bottom:90px;
background:#2563eb;
color:white;
padding:15px 18px;
border-radius:40px;
cursor:pointer;
font-weight:bold;
}

.cart-button span{
background:white;
color:black;
padding:3px 8px;
border-radius:10px;
margin-left:6px;
}

#cartPanel{
position:fixed;
top:0;
right:-400px;
width:350px;
height:100%;
background:white;
box-shadow:-5px 0 20px rgba(0,0,0,0.2);
padding:20px;
transition:0.3s;
overflow:auto;
}

#cartPanel.open{
right:0;
}

.cart-item{
border-bottom:1px solid #eee;
padding:10px 0;
}

.cart-total{
font-size:20px;
font-weight:bold;
margin-top:15px;
}

.whatsapp{
position:fixed;
right:20px;
bottom:20px;
background:#25D366;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
}

.btn-whatsapp{
background:#25D366;
color:white;
border:none;
padding:12px;
border-radius:8px;
width:100%;
margin-top:15px;
font-weight:bold;
cursor:pointer;
}

.btn-whatsapp:hover{
background:#1ebe5d;
}

.btn-clear{
background:#ef4444;
color:white;
border:none;
padding:12px;
border-radius:8px;
width:100%;
margin-top:10px;
font-weight:bold;
cursor:pointer;
}

.btn-clear:hover{
background:#dc2626;
}

.btn-close{
background:#e5e7eb;
border:none;
padding:12px;
border-radius:8px;
width:100%;
margin-top:10px;
font-weight:bold;
cursor:pointer;
}

.btn-close:hover{
background:#d1d5db;
}  

.buy-now{
background:#2563eb;
color:white;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
margin-top:6px;
width:100%;
}

.buy-now:hover{
background:#1d4ed8;
}  

.aviso{
position:fixed;
bottom:100px;
right:20px;
background:#111827;
color:white;
padding:12px 18px;
border-radius:8px;
font-size:14px;
opacity:0;
transform:translateY(20px);
transition:0.3s;
z-index:9999;
}

.aviso.show{
opacity:1;
transform:translateY(0);
} 

.envio-banner{
position:fixed;
top:0;
left:0;
width:100%;
background:#16a34a;
color:white;
text-align:center;
padding:10px;
font-weight:bold;
font-size:14px;
z-index:9999;
box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

.envio-banner span{
font-weight:normal;
}

.cerrar-envio{
position:absolute;
right:15px;
top:8px;
cursor:pointer;
font-weight:bold;
} 

.pagos{
background:white;
padding:20px;
margin:20px auto;
max-width:1200px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
text-align:center;
}

.pagos h3{
margin-bottom:10px;
font-size:16px;
color:#111827;
}

.pagos-logos,
.envios-logos{
display:flex;
justify-content:center;
align-items:center;
flex-wrap:wrap;
gap:20px;
margin-top:10px;
}

.pagos img,
.envios-logos img{
height:34px;
object-fit:contain;
}

.transferencia,
.credifin{
font-weight:500;
font-size:14px;
color:#374151;
}

.pagos hr{
margin:20px 0;
border:none;
border-top:1px solid #e5e7eb;
}

.buy-now:hover{
background:#1d4ed8;
}

/* NUEVO BLOQUE QUE DEBE AGREGAR */

.pagos-logos img,
.envios-logos img{
height:36px;
margin:0 8px;
vertical-align:middle;
}

.envios-logos span,
.transferencia{
margin-right:15px;
font-size:14px;
color:#374151;
}

.envios-logos{
display:flex;
justify-content:center;
align-items:center;
flex-wrap:wrap;
gap:20px;
margin-top:10px;
}

.envios-logos img{
height:34px;
object-fit:contain;
}

.envios-logos span{
margin-right:15px;
font-size:14px;
color:#374151;
}

.envios-logos img:hover{
transform:scale(1.08);
filter:none;
}  

</style>  

</style>

</head>

<body>

<div class="envio-banner" id="envioBanner">

🚚 Envíos a todo el país por solo <b>$8.000</b> —  
🎁 Envío GRATIS en compras superiores a <b>$40.000</b>

<span class="cerrar-envio" onclick="cerrarBanner()">✕</span>

</div>  

<header>
Catálogo de Productos
</header>

<div class="pagos">

<h3>Medios de pago disponibles</h3>

<div class="pagos-logos">

<img src="https://cdn-icons-png.flaticon.com/512/196/196578.png" alt="Visa">

<img src="https://cdn-icons-png.flaticon.com/512/196/196561.png" alt="Mastercard">

<img src="https://cdn-icons-png.flaticon.com/512/174/174861.png" alt="Paypal">

<img src="https://cdn-icons-png.flaticon.com/512/2331/2331941.png" alt="Transferencia bancaria">

<span class="transferencia">Transferencia bancaria</span>

</div>

<hr>

<h3>Medios de envío</h3>

<div class="envios-logos">

<img src="https://cdn-icons-png.flaticon.com/512/3082/3082034.png" alt="Correo Argentino">
<span>Correo Argentino</span>

<img src="https://cdn-icons-png.flaticon.com/512/2972/2972185.png" alt="Andreani">
<span>Andreani</span>

<img src="https://cdn-icons-png.flaticon.com/512/869/869636.png" alt="OCA">
<span>OCA</span>

<img src="https://cdn-icons-png.flaticon.com/512/3082/3082034.png" alt="Via Cargo">
<span>Vía Cargo</span>

<img src="https://cdn-icons-png.flaticon.com/512/1995/1995470.png" alt="Credifin">
<span>Credifín</span>

</div>
  

<div class="container">

<div class="search-bar">

<input id="search" placeholder="Buscar productos...">

<select id="sort">
<option value="">Ordenar por</option>
<option value="az">A-Z</option>
<option value="za">Z-A</option>
<option value="menor">Precio menor</option>
<option value="mayor">Precio mayor</option>
</select>

</div>

<div id="categorias" class="categorias"></div>

<div id="productos" class="grid"></div>

</div>

<div class="cart-button" onclick="toggleCart()">
🛒 <span id="contador">0</span>
</div>

<div id="cartPanel">

<h2>Tu carrito</h2>

<div id="cartItems"></div>

<div id="cartTotal" class="cart-total"></div>

<button class="btn-whatsapp" onclick="enviarWhatsApp()">
Enviar pedido por WhatsApp
</button>

<button class="btn-clear" onclick="limpiarCarrito()">
Limpiar carrito
</button>

<button class="btn-close" onclick="toggleCart()">
Cerrar carrito
</button>
</div>

<a href="https://wa.me/5493401415127" class="whatsapp" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" width="30">
</a>

<script>

let productos=[]
let categorias={}
let carrito=JSON.parse(localStorage.getItem("carrito"))||[]

fetch("productos.json")
.then(r=>r.json())
.then(data=>{

productos=data

data.forEach(p=>{

let cat=(p.category||"Otros").split(">")[0].trim()

if(!categorias[cat]) categorias[cat]=[]

categorias[cat].push(p)

})

crearCategorias()

let categoriaGuardada = localStorage.getItem("categoriaActiva")

if(categoriaGuardada && categorias[categoriaGuardada]){

mostrarProductos(categorias[categoriaGuardada])

setTimeout(()=>{
document.querySelectorAll(".categorias button").forEach(btn=>{
if(btn.innerText===categoriaGuardada){
btn.classList.add("active")
}
})
},50)

}else{

mostrarProductos(productos)

}

actualizarCarrito()

setTimeout(restaurarScroll,100)

})

function crearCategorias(){

let cont=document.getElementById("categorias")

Object.keys(categorias).forEach(cat=>{

let btn=document.createElement("button")

btn.textContent=cat

btn.onclick=()=>{

document.querySelectorAll(".categorias button")
.forEach(b=>b.classList.remove("active"))

btn.classList.add("active")

localStorage.setItem("categoriaActiva",cat)

mostrarProductos(categorias[cat])

}

cont.appendChild(btn)

})

}

function mostrarProductos(lista){

let cont=document.getElementById("productos")

let html=""

lista.forEach(p=>{

html+=`

<div class="card">

<a href="producto.html?nombre=${encodeURIComponent(p.name)}&categoria=${encodeURIComponent(p.category)}"
onclick="guardarScroll()">
<img src="${p.image}" loading="lazy">

</a>

<h4>${p.name}</h4>

<div class="price">${p.price}</div>

<button class="buy-btn"
onclick="agregarCarrito('${p.name}','${p.price}')">
Agregar al carrito
</button>

<button class="buy-now"
onclick="comprarAhora('${p.name}','${p.price}')">
Comprar ahora
</button>
</div>

`

})

cont.innerHTML=html

}

function agregarCarrito(nombre,precio){

let prod=carrito.find(p=>p.name===nombre)

if(prod) prod.cantidad++
else carrito.push({name:nombre,price:precio,cantidad:1})

actualizarCarrito()

}

function sumarCantidad(i){
carrito[i].cantidad++
actualizarCarrito()
}

function restarCantidad(i){

carrito[i].cantidad--

if(carrito[i].cantidad<=0) carrito.splice(i,1)

actualizarCarrito()

}

function eliminarProducto(i){

carrito.splice(i,1)

actualizarCarrito()

}

function limpiarCarrito(){

carrito=[]

actualizarCarrito()

mostrarAviso("Carrito vaciado")

}

function actualizarCarrito(){

let total=0
let cantidad=0

let cont=document.getElementById("cartItems")
cont.innerHTML=""

carrito.forEach((p,i)=>{

let precio=parseFloat(p.price.replace("$","").replace(/\./g,"").replace(",","."))
let subtotal=precio*p.cantidad

total+=subtotal
cantidad+=p.cantidad

cont.innerHTML+=`

<div class="cart-item">

<b>${p.name}</b>

<div>

<button onclick="restarCantidad(${i})">➖</button>

${p.cantidad}

<button onclick="sumarCantidad(${i})">➕</button>

<button onclick="eliminarProducto(${i})">🗑</button>

</div>

Subtotal: $${subtotal.toLocaleString()}

</div>

`

})

document.getElementById("contador").innerText=cantidad
document.getElementById("cartTotal").innerHTML="Total: $"+total.toLocaleString()

localStorage.setItem("carrito",JSON.stringify(carrito))

}

function toggleCart(){

document.getElementById("cartPanel").classList.toggle("open")

}

function enviarWhatsApp(){

if(carrito.length===0){

alert("El carrito está vacío")

return

}



let mensaje="🛒 *Nuevo pedido desde el catálogo*%0A%0A"

carrito.forEach(p=>{

mensaje+=`• ${p.name}%0A`
mensaje+=`Cantidad: ${p.cantidad}%0A`
mensaje+=`Precio: ${p.price}%0A%0A`

})

mensaje+="📦 Pedido generado desde el catálogo online."

window.open(
`https://wa.me/5493401415127?text=${mensaje}`
)

}

document.getElementById("search").addEventListener("input",function(){

let t=this.value.toLowerCase()

mostrarProductos(productos.filter(p=>p.name.toLowerCase().includes(t)))

})

document.getElementById("sort").addEventListener("change",function(){

let v=this.value
let lista=[...productos]

function precioNumero(p){
return parseFloat(
p.price.replace("$","").replace(/\./g,"").replace(",",".")
)
}

if(v==="az") lista.sort((a,b)=>a.name.localeCompare(b.name))

if(v==="za") lista.sort((a,b)=>b.name.localeCompare(a.name))

if(v==="menor") lista.sort((a,b)=>precioNumero(a)-precioNumero(b))

if(v==="mayor") lista.sort((a,b)=>precioNumero(b)-precioNumero(a))

mostrarProductos(lista)

})

function comprarAhora(nombre,precio){

let mensaje="🛒 *Quiero comprar éste producto*%0A%0A"

mensaje+=`Producto: ${nombre}%0A`
mensaje+=`Precio: ${precio}%0A%0A`

mensaje+="📦 Enviado desde el catálogo online."

window.open(
`https://wa.me/5493401415127?text=${mensaje}`
)

}  

function mostrarAviso(texto){

let aviso=document.createElement("div")

aviso.className="aviso"

aviso.innerText=texto

document.body.appendChild(aviso)

setTimeout(()=>{
aviso.classList.add("show")
},10)

setTimeout(()=>{
aviso.classList.remove("show")

setTimeout(()=>{
aviso.remove()
},300)

},2000)

}

function guardarScroll(){

localStorage.setItem("catalogo_scroll", window.scrollY)

}

function restaurarScroll(){

let pos = localStorage.getItem("catalogo_scroll")

if(pos){

window.scrollTo(0, pos)

localStorage.removeItem("catalogo_scroll")

}

}  

function cerrarBanner(){

document.getElementById("envioBanner").style.display="none"

}  
  
</script>

</body>
</html>
